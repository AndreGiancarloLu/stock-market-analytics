version : 2

sources:
  - name: raw_data
    database: terraform-demo-484209
    schema: raw_stock_data
    description: "Source data for stock market analytics"
    tables:
      - name: sp500_tickers
        description: "List of S&P 500 companies and their ticker symbols"
        columns:
          - name: Symbol
            description: "The stock ticker symbol (e.g., AAPL, MSFT)"
            tests:
              - not_null
              - unique
          - name: Security
            description: "The full name of the company"
            tests:
              - not_null
          - name: GICS Sector
            description: "The GICS sector to which the company belongs"

          - name: GICS Sub-Industry
            description: "The GICS sub-industry to which the company belongs"

      - name: stock_prices
        description: "Daily stock prices for various companies"
        columns:
          - name: date
            description: "The date of the stock price record"
            tests:
              - not_null
          - name: symbol
            description: "The stock ticker symbol (e.g., AAPL, MSFT)"
            tests:
              - not_null
          - name: open
            description: "The opening price of the stock on the given date"
            tests:
              - not_null
          - name: close
            description: "The closing price of the stock on the given date"
            tests:
              - not_null
          - name: high
            description: "The highest price of the stock on the given date"
            tests:
              - not_null
          - name: low
            description: "The lowest price of the stock on the given date"
            tests:
              - not_null
          - name: volume
            description: "The trading volume of the stock on the given date"
            tests:
              - not_null